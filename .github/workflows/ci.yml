name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  release-gate:
    runs-on: ubuntu-latest
    env:
      CRON_SECRET: ci-placeholder-secret
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-placeholder-turnstile-site-key
      RATE_LIMIT_SECRET: ci-placeholder-rate-limit-secret
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
      TURNSTILE_SECRET_KEY: ci-placeholder-turnstile-secret
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
